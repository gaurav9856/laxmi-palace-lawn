<header class="site-header">
  <div class="container header-inner">
    <a routerLink="/" class="brand" (click)="close()">
      <span class="brand-mark">L</span>
      <span class="brand-text">
        <strong>Laxmi Palace</strong>
        <small>Lawn · Chakia</small>
      </span>
    </a>

    <button class="hamburger" aria-label="Toggle menu" (click)="toggle()">
      <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>

    <nav class="nav" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="close()">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="close()">About</a>
      <a routerLink="/gallery" routerLinkActive="active" (click)="close()">Gallery</a>
      <a routerLink="/booking" routerLinkActive="active" (click)="close()">Booking</a>
      <a routerLink="/booking" class="btn-luxury cta" (click)="close()">
        <mat-icon>celebration</mat-icon> Book Now
      </a>
    </nav>
  </div>
</header>
